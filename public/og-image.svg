<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f06"/>
      <stop offset="50%" stop-color="#2e1c0c"/>
      <stop offset="100%" stop-color="#1a0f06"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff1c2"/>
      <stop offset="25%" stop-color="#f3d070"/>
      <stop offset="55%" stop-color="#d4af37"/>
      <stop offset="85%" stop-color="#aa8422"/>
      <stop offset="100%" stop-color="#876816"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="30%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f3d070"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle dot pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#d4af37" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.4"/>
  <!-- Inner border -->
  <rect x="35" y="35" width="1130" height="560" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>

  <!-- Corner ornaments top-left -->
  <path d="M35 35 L35 120 M35 35 L120 35" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <circle cx="35" cy="35" r="4" fill="#d4af37" opacity="0.6"/>
  <!-- Corner ornaments top-right -->
  <path d="M1165 35 L1165 120 M1165 35 L1080 35" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <circle cx="1165" cy="35" r="4" fill="#d4af37" opacity="0.6"/>
  <!-- Corner ornaments bottom-left -->
  <path d="M35 595 L35 510 M35 595 L120 595" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <circle cx="35" cy="595" r="4" fill="#d4af37" opacity="0.6"/>
  <!-- Corner ornaments bottom-right -->
  <path d="M1165 595 L1165 510 M1165 595 L1080 595" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <circle cx="1165" cy="595" r="4" fill="#d4af37" opacity="0.6"/>

  <!-- Top ornament line -->
  <line x1="200" y1="120" x2="1000" y2="120" stroke="url(#goldH)" stroke-width="1"/>
  <circle cx="600" cy="120" r="3" fill="#d4af37" opacity="0.8"/>
  <circle cx="580" cy="120" r="1.5" fill="#d4af37" opacity="0.5"/>
  <circle cx="620" cy="120" r="1.5" fill="#d4af37" opacity="0.5"/>

  <!-- Rings illustration — centered, elegant -->
  <!-- Left ring -->
  <circle cx="558" cy="220" r="52" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.9"/>
  <!-- Right ring — overlap effect -->
  <circle cx="642" cy="220" r="52" fill="none" stroke="#2e1c0c" stroke-width="16"/>
  <circle cx="642" cy="220" r="52" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.9"/>
  <!-- Overlap fix: re-draw left ring arc in front -->
  <path d="M600 168 A52 52 0 0 0 600 272" fill="none" stroke="#2e1c0c" stroke-width="16"/>
  <path d="M600 168 A52 52 0 0 0 600 272" fill="none" stroke="url(#gold)" stroke-width="12" opacity="0.9"/>

  <!-- Main title -->
  <text x="600" y="340"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="96"
        font-weight="400"
        fill="url(#gold)"
        text-anchor="middle"
        letter-spacing="8">PokaniPro</text>

  <!-- Divider -->
  <line x1="300" y1="370" x2="900" y2="370" stroke="url(#goldH)" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="420"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        fill="#d4af37"
        text-anchor="middle"
        letter-spacing="12"
        opacity="0.85">&#1044;&#1048;&#1043;&#1048;&#1058;&#1040;&#1051;&#1053;&#1048; &#1055;&#1054;&#1050;&#1040;&#1053;&#1048;</text>

  <!-- Tagline -->
  <text x="600" y="490"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="22"
        fill="#d4af37"
        text-anchor="middle"
        letter-spacing="4"
        opacity="0.55">&#1057;&#1042;&#1040;&#1058;&#1041;&#1040; · &#1050;&#1056;&#1066;&#1065;&#1058;&#1045;&#1053;&#1045; · &#1056;&#1054;&#1046;&#1044;&#1045;&#1053; &#1044;&#1045;&#1053; · &#1070;&#1041;&#1048;&#1051;&#1045;&#1049;</text>

  <!-- Bottom ornament line -->
  <line x1="200" y1="530" x2="1000" y2="530" stroke="url(#goldH)" stroke-width="1"/>
  <circle cx="600" cy="530" r="3" fill="#d4af37" opacity="0.8"/>
  <circle cx="580" cy="530" r="1.5" fill="#d4af37" opacity="0.5"/>
  <circle cx="620" cy="530" r="1.5" fill="#d4af37" opacity="0.5"/>

  <!-- Website URL -->
  <text x="600" y="575"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18"
        fill="#d4af37"
        text-anchor="middle"
        letter-spacing="3"
        opacity="0.4">davidabg91.github.io/wedding</text>
</svg>
